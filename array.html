<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>array</title>
</head>
<body>
    <p id="demo"></p>
<script>
    var res ="";
    var n = ["Apple", "Mango", "Banana", "Jackfruit", "Pineapple"]
 for(let i=0; i<n.length;i++){
    res += n[i] + "<br>";
 }
 document.getElementById("demo").innerHTML=res;

    

</script>
</body>
</html>
