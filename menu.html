<html>
<title>Resturant Menu</title>
<head>
<style>
body{
    font-family:Arial, Helvetica, sans-serif;
    text-align:center;
    background-color:rgb(228, 217, 208);
    padding:20px;
}
h1 {
    color:rgb(214, 111, 26);
   }
   p{
    background:#ffe0b2;
    padding:10px 20px;
    border-radius:8px;
    color:#5e1b06;
    display:inline-block;
    font-weight:bold;
    max-width:400px;
   }
   ul{
    margin-top:20px; padding:0px;
   }
   ul > li{
    list-style:none;
    font-size:18px;
    font-weight:bold;
    color:#5d3047;
    padding:10px 20px;
    margin:6px;
    width:260px;
    background:#fff3e0;
    border-radius:8px;
    margin-left:auto;
    margin-right:auto;
    gap:20px;
   }
   ul li:nth-child(3){
    background:#ffe082;
    color:#e65c00;
   }
   .desc::first-letter{
    color:#e65c00;
    font-size:220%;
    font-weight:bold;
   }
   .links{
    margin-top:25px;
   }
   
   a{
   color:#e65c00;
   text-decoration:none;
   padding:8 18px;
   margin:0px 12px;
   border:2px solid #e65c00;
   border-radius:8px;
   }
   a:hover{
    background:#e65c00;
    color:white;
   }

</style>
</head>
<body>
<h1>My Food Menu</h1>
<p>Pick your favourtie and dig in!</p>
<ul>
    <li>Pizza</li>
    <li>Burger</li>
    <li>Tacos--Cheif's Special</li>
    <li>Noodles</li>
    <li>Icecream</li>
</ul>
<p class="desc">
    Every dish on this menu is made with love and loads of flavours.
    Try them all and find your favoutite.
</p>
<div class="Links">
    <a href="#">Order Now</a>
    <a href="#">See More</a>
</div>
</body>
</html>
